name: Monthly Deep Resync

on:
  workflow_dispatch:
  schedule:
    - cron: "42 16 1 * *"

permissions:
  contents: read

concurrency:
  group: database-sync
  cancel-in-progress: false

jobs:
  resync:
    runs-on: self-hosted
    timeout-minutes: 7200

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install 1Password CLI
        if: vars.OP_COOKIES_SECRET_REFERENCE != '' || (vars.OP_COOKIES_VAULT != '' && vars.OP_COOKIES_ITEM != '')
        uses: 1password/install-cli-action@v3

      - name: Load crawler cookies from 1Password
        if: vars.OP_COOKIES_SECRET_REFERENCE != ''
        continue-on-error: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_COOKIES_SECRET_REFERENCE: ${{ vars.OP_COOKIES_SECRET_REFERENCE }}
        run: |
          if [ -z "${OP_SERVICE_ACCOUNT_TOKEN:-}" ]; then
            echo "OP_SERVICE_ACCOUNT_TOKEN is not configured, skipping 1Password cookie load"
            exit 0
          fi

          export EHENTAI_COOKIES_JSON="$(op read "$OP_COOKIES_SECRET_REFERENCE")"
          umask 077
          python .github/scripts/write_cookies_json.py

      - name: Build ehdb-sync
        run: |
          echo "Building ehdb-sync..."
          go build -o bin/ehdb-sync ./cmd/sync

      - name: Create config file
        run: |
          cat > config.yaml << EOF
          database:
            host: ${{ secrets.POSTGRES_HOST }}
            port: ${{ secrets.POSTGRES_PORT }}
            user: ${{ secrets.POSTGRES_USER }}
            password: ${{ secrets.POSTGRES_PASSWORD }}
            dbname: ${{ secrets.POSTGRES_DATABASE }}
            sslmode: disable

          crawler:
            host: exhentai.org
            cookies: "${{ secrets.EHENTAI_COOKIES }}"
            proxy: ""
            retry_times: 3
            wait_for_ip_unban: true
            page_delay_seconds: 1
            api_delay_seconds: 3

          log_level: info
          EOF

      - name: Resync galleries from last 3 months
        run: |
          echo "Resyncing galleries from last 90 days..."
          ./bin/ehdb-sync resync -config config.yaml -hours 2160

      - name: Mark replaced galleries
        run: |
          echo "Marking replaced galleries..."
          ./bin/ehdb-sync mark-replaced -config config.yaml

      - name: Persist crawler cookies to 1Password
        if: always() && hashFiles('cookies.json') != '' && vars.OP_COOKIES_VAULT != '' && vars.OP_COOKIES_ITEM != ''
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_COOKIES_VAULT: ${{ vars.OP_COOKIES_VAULT }}
          OP_COOKIES_ITEM: ${{ vars.OP_COOKIES_ITEM }}
        run: |
          if [ -z "${OP_SERVICE_ACCOUNT_TOKEN:-}" ]; then
            echo "OP_SERVICE_ACCOUNT_TOKEN is not configured, skipping 1Password persistence"
            exit 0
          fi

          umask 077
          if op item get "$OP_COOKIES_ITEM" --vault "$OP_COOKIES_VAULT" --format json > op-item.json 2>/dev/null; then
            chmod 600 op-item.json
          else
            rm -f op-item.json
          fi
          if [ -f op-item.json ]; then
            if python .github/scripts/prepare_op_item.py --mode update --item-path op-item.json; then
              op item edit "$OP_COOKIES_ITEM" --vault "$OP_COOKIES_VAULT" --template op-item.json </dev/null > /dev/null
            else
              status=$?
              if [ "$status" -eq 10 ]; then
                echo "Crawler cookies unchanged, skipping 1Password update"
              else
                exit "$status"
              fi
            fi
          else
            op item template get "Secure Note" > op-item-create.json
            chmod 600 op-item-create.json
            python .github/scripts/prepare_op_item.py --mode create --item-path op-item-create.json --title "$OP_COOKIES_ITEM"
            op item create --vault "$OP_COOKIES_VAULT" --template op-item-create.json </dev/null > /dev/null
          fi

      - name: Export PostgreSQL database
        run: |
          echo "Exporting PostgreSQL database..."
          PGPASSWORD=${{ secrets.POSTGRES_PASSWORD }} pg_dump -h ${{ secrets.POSTGRES_HOST }} \
            -p ${{ secrets.POSTGRES_PORT }} -Fc -Z "zstd" \
            -U ${{ secrets.POSTGRES_USER }} -f ehentai_db.dump ${{ secrets.POSTGRES_DATABASE }}

      - name: Generate statistics
        run: |
          echo "Generating database statistics..."

          # Collect statistics data
          TOTAL_GALLERIES=$(PGPASSWORD=${{ secrets.POSTGRES_PASSWORD }} psql -h ${{ secrets.POSTGRES_HOST }} \
            -p ${{ secrets.POSTGRES_PORT }} -U ${{ secrets.POSTGRES_USER }} \
            -d ${{ secrets.POSTGRES_DATABASE }} -t -c "SELECT COUNT(*) FROM gallery;" | xargs)

          ACTIVE_GALLERIES=$(PGPASSWORD=${{ secrets.POSTGRES_PASSWORD }} psql -h ${{ secrets.POSTGRES_HOST }} \
            -p ${{ secrets.POSTGRES_PORT }} -U ${{ secrets.POSTGRES_USER }} \
            -d ${{ secrets.POSTGRES_DATABASE }} -t -c "SELECT COUNT(*) FROM gallery WHERE expunged = FALSE;" | xargs)

          TOTAL_TAGS=$(PGPASSWORD=${{ secrets.POSTGRES_PASSWORD }} psql -h ${{ secrets.POSTGRES_HOST }} \
            -p ${{ secrets.POSTGRES_PORT }} -U ${{ secrets.POSTGRES_USER }} \
            -d ${{ secrets.POSTGRES_DATABASE }} -t -c "SELECT COUNT(*) FROM tag;" | xargs)

          TOTAL_TORRENTS=$(PGPASSWORD=${{ secrets.POSTGRES_PASSWORD }} psql -h ${{ secrets.POSTGRES_HOST }} \
            -p ${{ secrets.POSTGRES_PORT }} -U ${{ secrets.POSTGRES_USER }} \
            -d ${{ secrets.POSTGRES_DATABASE }} -t -c "SELECT COUNT(*) FROM torrent;" | xargs)

          DB_SIZE=$(PGPASSWORD=${{ secrets.POSTGRES_PASSWORD }} psql -h ${{ secrets.POSTGRES_HOST }} \
            -p ${{ secrets.POSTGRES_PORT }} -U ${{ secrets.POSTGRES_USER }} \
            -d ${{ secrets.POSTGRES_DATABASE }} -t -c "SELECT pg_size_pretty(pg_database_size('${{ secrets.POSTGRES_DATABASE }}'));" | xargs)

          # Generate markdown formatted statistics report
          cat > resync_stats.txt << EOF
          ## 📦 Database Import

          \`\`\`bash
          # 1. Download the database dump
          wget https://github.com/Slinet6056/ehdb/releases/download/live/ehentai_db.dump

          # 2. Create database (if not exists)
          createdb -U postgres ehentai_db

          # 3. Import the database
          pg_restore -U postgres -d ehentai_db --no-owner --no-privileges -v ehentai_db.dump
          \`\`\`

          **Note: PostgreSQL 17 or later is required.**

          ---

          ## 📊 Database Statistics

          ### 📈 Overview

          | Metric | Count |
          |--------|-------|
          | Total Galleries | ${TOTAL_GALLERIES} |
          | Active Galleries (Not Expunged) | ${ACTIVE_GALLERIES} |
          | Total Tags | ${TOTAL_TAGS} |
          | Total Torrents | ${TOTAL_TORRENTS} |
          | Database Size | ${DB_SIZE} |

          ### 📂 Category Breakdown

          | Category | Count |
          |----------|-------|
          EOF

          # Add category statistics
          PGPASSWORD=${{ secrets.POSTGRES_PASSWORD }} psql -h ${{ secrets.POSTGRES_HOST }} \
            -p ${{ secrets.POSTGRES_PORT }} -U ${{ secrets.POSTGRES_USER }} \
            -d ${{ secrets.POSTGRES_DATABASE }} -t -A -F'|' \
            -c "SELECT category, COUNT(*) as count FROM gallery WHERE expunged = FALSE GROUP BY category ORDER BY count DESC;" \
            | while IFS='|' read -r category count; do
              echo "| ${category} | ${count} |" >> resync_stats.txt
            done

          echo "" >> resync_stats.txt
          echo "---" >> resync_stats.txt
          echo "*Last updated: $(date -u '+%Y-%m-%d %H:%M:%S UTC')*" >> resync_stats.txt
          echo "" >> resync_stats.txt
          echo "**Sync Type:** Monthly Deep Resync (3 months of existing galleries)" >> resync_stats.txt

          cat resync_stats.txt

      - name: Update Live Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: live
          name: Live Sync Database
          body_path: resync_stats.txt
          draft: false
          prerelease: false
          make_latest: true
          files: |
            ehentai_db.dump
          token: ${{ secrets.CUSTOM_GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          rm -f cookies.json ehentai_db.dump config.yaml op-item-create.json op-item.json resync_stats.txt
          echo "Cleanup completed"
